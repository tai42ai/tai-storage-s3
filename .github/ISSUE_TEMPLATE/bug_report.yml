name: Bug report
description: Report a defect in tai-storage-s3 (the S3 Storage backend)
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal steps or code that reproduce the problem.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: tai-storage-s3 version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, the host tai-skeleton version, the aioboto3 version, and the S3 endpoint (AWS or MinIO).
      placeholder: "Python 3.13.x, macOS 15"
    validations:
      required: true
