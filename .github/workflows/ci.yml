name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tai-storage-s3
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          path: tai-storage-s3
      # The committed uv.lock resolves tai-contract and tai-kit from sibling
      # checkouts ([tool.uv.sources] editable paths), so CI clones them next to
      # this repo (tai-kit in turn resolves tai-contract from the same layout).
      # TEMPORARY (private dev): the sibling repos are private, so cross-repo
      # checkout needs TAI_CI_TOKEN (fine-grained, Contents:read on the tai
      # library repos); the default GITHUB_TOKEN cannot read another private repo.
      # TODO(public): once these repos are public and tai-contract/tai-kit publish
      # to PyPI, delete the token lines and the sibling checkouts — install from PyPI.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: ${{ github.repository_owner }}/tai-contract
          path: tai-contract
          token: ${{ secrets.TAI_CI_TOKEN }}
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: ${{ github.repository_owner }}/tai-kit
          path: tai-kit
          token: ${{ secrets.TAI_CI_TOKEN }}
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.26"
          enable-cache: true
      - run: uv python install 3.13
      # The dev dependency-group (PEP 735, installed by default) carries the
      # test/lint tooling. --locked asserts the committed uv.lock is current;
      # --python pins the interpreter.
      - run: uv sync --locked --python 3.13
      - name: Ruff
        run: uv run ruff check .
      - name: Ruff format
        run: uv run ruff format --check .
      - name: Pyright
        run: uv run pyright
      - name: Pytest
        run: uv run pytest --cov --cov-report=term-missing
